<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🏁 CRUIS'N USA · PSEUDO-3D RACER</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b1b1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }
    .game-container {
      background: #1a0f08;
      border-radius: 16px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.9), 0 0 0 5px #8b7356;
      padding: 8px;
    }
    canvas {
      display: block;
      width: 900px;
      height: 550px;
      border-radius: 8px;
      background: #1a2a3a;
      cursor: none;
    }
    .info {
      text-align: center;
      margin-top: 12px;
      color: #ffd98c;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 #3a1f00;
    }
    .info kbd {
      background: #2d1e0e;
      padding: 4px 12px;
      border-radius: 24px;
      color: #ffe3a4;
      margin: 0 6px;
      border: 1px solid #c9a76b;
    }
  </style>
</head>
<body>
<div>
  <div class="game-container">
    <canvas id="gameCanvas" width="900" height="550"></canvas>
  </div>
  <div class="info">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> &nbsp;|&nbsp; <kbd>W</kbd> <kbd>S</kbd> <kbd>A</kbd> <kbd>D</kbd> &nbsp;|&nbsp; 🚗 DRIFT · SURVIVE &nbsp;|&nbsp; <kbd>R</kbd> RESTART
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CANVAS ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 550;
    const HORIZON_Y = 200;        // sky/road horizon (pixels from top)

    // ---------- FIXED TIMESTEP ----------
    const FIXED_DT = 1/60;
    let accumulator = 0;
    let lastTimestamp = 0;
    let gameActive = true;
    let gameOver = false;
    let winFlag = false;

    // ---------- TRACK PARAMETERS (world units) ----------
    const SEGMENT_LENGTH = 200;
    const ROAD_WIDTH = 2400;
    const LANE_WIDTH = ROAD_WIDTH / 3;
    const CAMERA_HEIGHT = 1400;     // camera y above road
    const CAMERA_DIST = 0.75;       // projection factor

    const TRACK_SEGMENTS = 300;      // total segments (loop)
    let segments = [];
    let roadWorldX = new Float32Array(TRACK_SEGMENTS); // accumulated curve offset

    // ---------- PLAYER ----------
    let player = {
      segPos: 3.0,
      x: 0.0,               // lateral world position
      dx: 0.0,              // lateral speed (drift)
      speed: 70.0,
      maxSpeed: 450,
      accel: 190,
      brake: 280,
      turnSpeed: 3.2,
      grip: 0.92,
      offroadGrip: 0.72
    };

    // ---------- TIMER & CHECKPOINTS ----------
    let timer = 80.0;
    const CHECKPOINT_SEGMENTS = [40, 100, 160, 220, 280];
    let nextCheckpointIndex = 0;
    const TIME_GAIN = 14.0;

    // ---------- AI TRAFFIC ----------
    let traffic = [];
    const TRAFFIC_COUNT = 7;

    // ---------- INPUT ----------
    const keys = {
      ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
      KeyW: false, KeyS: false, KeyA: false, KeyD: false
    };

    // ---------- TRACK GENERATION (curves, hills, surface) ----------
    function buildTrack() {
      segments = [];
      for (let i = 0; i < TRACK_SEGMENTS; i++) {
        let curve = 0.0;
        let elevation = 0.0;
        let type = 'asphalt';

        // varied track layout
        if (i < 50) {
          curve = 0.0;
          elevation = Math.sin(i * 0.13) * 20;
        } else if (i < 90) {
          curve = 0.022;
          elevation = 15 + Math.sin(i * 0.2) * 25;
        } else if (i < 140) {
          curve = -0.018;
          elevation = 40 - (i-90) * 0.4;
        } else if (i < 190) {
          curve = -0.045;  // sharp left
          elevation = 30 + 50 * Math.sin((i-140) * 0.12);
          type = (i > 160 && i < 180) ? 'gravel' : 'asphalt';
        } else if (i < 240) {
          curve = 0.038;
          elevation = 20 + 35 * Math.cos(i * 0.1);
          type = (i > 210 && i < 230) ? 'gravel' : 'asphalt';
        } else {
          curve = -0.015;
          elevation = 10 + 25 * Math.sin(i * 0.08);
          type = 'asphalt';
        }
        if (i > 260 && i < 275) type = 'gravel';

        segments.push({ index: i, curve, elevation, type });
      }

      // precompute accumulated world X offset
      let accumX = 0;
      for (let i = 0; i < TRACK_SEGMENTS; i++) {
        roadWorldX[i] = accumX;
        accumX += segments[i].curve * SEGMENT_LENGTH;
      }
    }

    // ---------- RESET GAME ----------
    function resetGame() {
      buildTrack();
      player = {
        segPos: 4.0, x: 0.0, dx: 0.0, speed: 80.0,
        maxSpeed: 450, accel: 190, brake: 280, turnSpeed: 3.2,
        grip: 0.92, offroadGrip: 0.72
      };
      timer = 80.0;
      nextCheckpointIndex = 0;
      gameOver = false;
      winFlag = false;
      gameActive = true;

      traffic = [];
      for (let i = 0; i < TRAFFIC_COUNT; i++) {
        let seg = (i * 47 + 19) % TRACK_SEGMENTS;
        let lane = (i % 3 - 1) * LANE_WIDTH * 0.75;
        traffic.push({
          segPos: seg + 0.5,
          x: lane,
          speed: 65 + Math.random() * 90,
          width: 360,
          length: 600
        });
      }
    }

    // ---------- INPUT ----------
    function handleKeyDown(e) {
      const code = e.code;
      if (code in keys) { keys[code] = true; e.preventDefault(); }
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
      if (code === 'KeyR') { resetGame(); e.preventDefault(); }
    }
    function handleKeyUp(e) {
      const code = e.code;
      if (code in keys) { keys[code] = false; e.preventDefault(); }
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
    }
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ---------- UTILS ----------
    function getSegmentAt(pos) {
      let idx = Math.floor(pos);
      let frac = pos - idx;
      idx = ((idx % TRACK_SEGMENTS) + TRACK_SEGMENTS) % TRACK_SEGMENTS;
      return { segment: segments[idx], idx, frac };
    }
    function getCurrentSurfaceGrip(pos) {
      let s = getSegmentAt(pos).segment;
      return s.type === 'gravel' ? player.offroadGrip : player.grip;
    }

    // ---------- PHYSICS UPDATE (fixed timestep) ----------
    function fixedUpdate(dt) {
      if (!gameActive || gameOver) return;

      const up = keys.ArrowUp || keys.KeyW;
      const down = keys.ArrowDown || keys.KeyS;
      const left = keys.ArrowLeft || keys.KeyA;
      const right = keys.ArrowRight || keys.KeyD;

      const surfaceGrip = getCurrentSurfaceGrip(player.segPos);

      // acceleration / brake
      if (up) player.speed += player.accel * dt;
      if (down) player.speed -= player.brake * dt;
      const friction = (surfaceGrip * 0.1) + 0.03;
      player.speed -= player.speed * friction * dt;
      player.speed = Math.min(player.maxSpeed, Math.max(8.0, player.speed));

      // steering (speed sensitive)
      if (left || right) {
        const steer = (left ? -1 : 0) + (right ? 1 : 0);
        const turnFactor = Math.min(1.2, player.speed / 250);
        player.dx += steer * player.turnSpeed * dt * 22 * (0.5 + turnFactor);
      }

      // lateral friction (grip)
      player.dx *= (1.0 - surfaceGrip * 2.6 * dt);
      player.x += player.dx * dt;

      const maxX = ROAD_WIDTH * 0.72;
      if (player.x > maxX) { player.x = maxX; player.dx *= -0.2; }
      if (player.x < -maxX) { player.x = -maxX; player.dx *= -0.2; }

      // move along track
      player.segPos += (player.speed / SEGMENT_LENGTH) * dt;
      if (player.segPos >= TRACK_SEGMENTS) player.segPos -= TRACK_SEGMENTS;
      if (player.segPos < 0) player.segPos += TRACK_SEGMENTS;

      // AI traffic
      for (let car of traffic) {
        car.segPos += (car.speed / SEGMENT_LENGTH) * dt;
        if (car.segPos >= TRACK_SEGMENTS) car.segPos -= TRACK_SEGMENTS;
        if (car.segPos < 0) car.segPos += TRACK_SEGMENTS;
      }

      // collision
      const playerIdx = Math.floor(player.segPos);
      for (let car of traffic) {
        let dist = Math.abs(car.segPos - player.segPos);
        if (dist > TRACK_SEGMENTS/2) dist = TRACK_SEGMENTS - dist;
        if (dist < 0.45 && Math.abs(car.x - player.x) < 520) {
          player.speed *= 0.78;
          player.dx += (player.x - car.x) * 0.06;
          car.segPos += 0.03;
        }
      }

      // checkpoints
      const curSeg = Math.floor(player.segPos);
      if (nextCheckpointIndex < CHECKPOINT_SEGMENTS.length) {
        const cp = CHECKPOINT_SEGMENTS[nextCheckpointIndex];
        if (curSeg >= cp && curSeg < cp + 10) {
          timer += TIME_GAIN;
          nextCheckpointIndex++;
        }
      }
      timer -= dt;
      if (timer <= 0.0) { timer = 0.0; gameOver = true; gameActive = false; }
      if (nextCheckpointIndex >= CHECKPOINT_SEGMENTS.length && timer > 5) winFlag = true;
    }

    // ---------- RENDERING (Cruis'n USA style) ----------
    function drawPlayerCar() {
      // fixed at bottom center, facing away (taillights)
      const carY = H - 75;
      const carW = 140;
      const carH = 90;
      const carX = W/2 - carW/2;

      // shadow
      ctx.fillStyle = '#00000055';
      ctx.beginPath();
      ctx.ellipse(W/2, carY + carH*0.6, carW*0.6, 15, 0, 0, Math.PI*2);
      ctx.fill();

      // car body (red sportscar)
      ctx.fillStyle = '#c02020';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.rect(carX, carY, carW, carH);
      ctx.fill();

      // dark roof / rear window
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(carX+15, carY-12, carW-30, 28);
      
      // spoiler
      ctx.fillStyle = '#333';
      ctx.fillRect(carX-6, carY+5, 12, 18);
      ctx.fillRect(carX+carW-6, carY+5, 12, 18);
      ctx.fillStyle = '#555';
      ctx.fillRect(carX-12, carY-2, carW+24, 8);

      // taillights (glowing)
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#ff3a3a';
      ctx.beginPath();
      ctx.arc(carX+20, carY+carH-12, 14, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ff5e00';
      ctx.beginPath();
      ctx.arc(carX+carW-20, carY+carH-12, 14, 0, Math.PI*2);
      ctx.fill();
      
      // license plate
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#f5e6d3';
      ctx.fillRect(carX+carW/2-18, carY+carH-18, 36, 14);
      ctx.fillStyle = '#222';
      ctx.font = 'bold 12px "Courier New", monospace';
      ctx.fillText('CRUISN', carX+carW/2-28, carY+carH-7);
      
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
    }

    function renderRoad() {
      const playerSeg = player.segPos;
      const baseIdx = Math.floor(playerSeg);
      const drawDist = 110;

      let visible = [];
      for (let i = 0; i < drawDist; i++) {
        let segIdx = (baseIdx + i) % TRACK_SEGMENTS;
        let seg = segments[segIdx];
        let z = i * SEGMENT_LENGTH + (player.segPos - baseIdx) * SEGMENT_LENGTH;
        if (z < 15) continue;

        let scale = CAMERA_DIST / (z + 0.1);
        let screenY = HORIZON_Y + (CAMERA_HEIGHT - seg.elevation) * scale;
        let worldOffset = roadWorldX[segIdx];
        let centerX = W/2 + (worldOffset - player.x) * scale;
        let roadW = ROAD_WIDTH * scale;

        visible.push({ seg, z, scale, screenY, centerX, roadW });
      }
      visible.sort((a,b) => b.z - a.z); // far to near

      for (let v of visible) {
        const { seg, scale, screenY, centerX, roadW } = v;
        const left = centerX - roadW/2;
        const right = centerX + roadW/2;
        const halfW = roadW/2;

        // grass / dirt
        ctx.fillStyle = '#2b6e3f';
        ctx.fillRect(0, screenY-3, W, 14 * scale + 10);
        
        // road surface
        ctx.fillStyle = seg.type === 'gravel' ? '#a58e72' : '#3a4048';
        ctx.beginPath();
        ctx.moveTo(left, screenY);
        ctx.lineTo(right, screenY);
        ctx.lineTo(right + 15*scale, screenY + 12*scale);
        ctx.lineTo(left - 15*scale, screenY + 12*scale);
        ctx.fill();

        // rumble strips (red/white)
        const rumble = roadW * 0.045;
        ctx.fillStyle = '#bb2f2f';
        ctx.fillRect(left - rumble, screenY-2, rumble, 8*scale+6);
        ctx.fillRect(right, screenY-2, rumble, 8*scale+6);
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(left - rumble*2, screenY, rumble, 6*scale);
        ctx.fillRect(right + rumble, screenY, rumble, 6*scale);

        // lane markings (dashed)
        ctx.strokeStyle = '#f5e68b';
        ctx.lineWidth = Math.max(3, 6*scale);
        ctx.setLineDash([25*scale, 35*scale]);
        ctx.beginPath();
        ctx.moveTo(centerX, screenY-3);
        ctx.lineTo(centerX, screenY + 10*scale);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // edge lines
        ctx.strokeStyle = '#d4d4d4';
        ctx.lineWidth = Math.max(2, 4*scale);
        ctx.beginPath();
        ctx.moveTo(left+6, screenY);
        ctx.lineTo(left+6, screenY+8*scale);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(right-6, screenY);
        ctx.lineTo(right-6, screenY+8*scale);
        ctx.stroke();
      }

      // AI cars
      for (let car of traffic) {
        let dist = car.segPos - player.segPos;
        let z = dist * SEGMENT_LENGTH;
        if (z < 40 || z > 9000) continue;
        
        let scale = CAMERA_DIST / (z + 0.1);
        let seg = segments[Math.floor(car.segPos) % TRACK_SEGMENTS];
        let worldOffset = roadWorldX[Math.floor(car.segPos) % TRACK_SEGMENTS];
        let screenY = HORIZON_Y + (CAMERA_HEIGHT - seg.elevation) * scale;
        let screenX = W/2 + (worldOffset - player.x + car.x) * scale;
        
        let cw = 360 * scale;
        let ch = 180 * scale;
        ctx.fillStyle = '#3a6ea5';
        ctx.fillRect(screenX - cw/2, screenY - ch*0.6, cw, ch);
        ctx.fillStyle = '#1e2f47';
        ctx.fillRect(screenX - cw/2+6, screenY - ch*0.4, cw-12, ch*0.5);
        ctx.fillStyle = '#e0b020';
        ctx.fillRect(screenX - cw/4, screenY - ch*0.8, cw/2, 12*scale);
      }

      // roadside objects (trees, posts)
      for (let v of visible) {
        if (v.z < 700 || v.z > 4500) continue;
        const s = v.scale;
        const leftEdge = v.centerX - v.roadW/2;
        const rightEdge = v.centerX + v.roadW/2;
        const yBase = v.screenY;
        
        if (Math.sin(v.seg.index * 0.7) > 0.3) {
          ctx.fillStyle = '#2d6a4f';
          ctx.fillRect(leftEdge - 45*s, yBase - 80*s, 16*s, 70*s);
          ctx.fillStyle = '#1b4d35';
          ctx.beginPath();
          ctx.arc(leftEdge - 37*s, yBase - 100*s, 22*s, 0, Math.PI*2);
          ctx.fill();
        }
        if (Math.cos(v.seg.index) > 0.2) {
          ctx.fillStyle = '#a57c50';
          ctx.fillRect(rightEdge + 25*s, yBase - 55*s, 12*s, 55*s);
          ctx.fillStyle = '#c99f6c';
          ctx.beginPath();
          ctx.arc(rightEdge + 31*s, yBase - 65*s, 14*s, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }

    function drawHUD() {
      ctx.font = 'bold 28px "Courier New", monospace';
      ctx.fillStyle = '#f2e8d5';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 10;
      ctx.fillText(`⚡ ${Math.floor(player.speed * 0.18)} mph`, 30, 60);
      ctx.font = 'bold 34px monospace';
      ctx.fillStyle = timer < 15 ? '#ff7060' : '#e0f2b0';
      ctx.fillText(`⏱️ ${Math.ceil(timer)}`, W-190, 70);
      ctx.font = '22px monospace';
      ctx.fillStyle = '#b8d9fc';
      ctx.fillText(`CHECK: ${nextCheckpointIndex}/${CHECKPOINT_SEGMENTS.length}`, 30, 110);
      let surf = getSegmentAt(player.segPos).segment.type;
      ctx.fillStyle = surf==='gravel' ? '#cb9e72' : '#a0b0c0';
      ctx.fillText(`🛞 ${surf.toUpperCase()}`, 30, 150);
      ctx.shadowBlur = 0;
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      
      // Sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, HORIZON_Y+50);
      grad.addColorStop(0, '#0a1c2f');
      grad.addColorStop(0.7, '#4f8bb9');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, HORIZON_Y+30);
      
      // sun
      ctx.fillStyle = '#fcd48c';
      ctx.beginPath();
      ctx.arc(W*0.75, HORIZON_Y-20, 40, 0, Math.PI*2);
      ctx.fill();
      
      renderRoad();
      drawPlayerCar();
      drawHUD();

      if (gameOver) {
        ctx.fillStyle = '#000000cc';
        ctx.fillRect(0, 0, W, H);
        ctx.font = '48px "Courier New", monospace';
        ctx.fillStyle = '#f55';
        ctx.fillText('GAME OVER', W/2-170, H/2);
      } else if (winFlag) {
        ctx.fillStyle = '#d4af37';
        ctx.font = '40px monospace';
        ctx.fillText('🏆 YOU SURVIVED! 🏆', W/2-230, H/2-20);
      }
    }

    // ---------- GAME LOOP ----------
    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      if (!lastTimestamp) { lastTimestamp = now; return; }
      let delta = Math.min(0.03, (now - lastTimestamp) / 1000);
      lastTimestamp = now;

      if (gameActive && !gameOver) {
        accumulator += delta;
        while (accumulator >= FIXED_DT) {
          fixedUpdate(FIXED_DT);
          accumulator -= FIXED_DT;
        }
      }
      render();
    }

    // ---------- START ----------
    resetGame();
    requestAnimationFrame(gameLoop);
  })();
</script>
</body>
</html>
