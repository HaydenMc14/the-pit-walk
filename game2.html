<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🚗 CRUIS'N USA · PSEUDO-3D RACER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b1b1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }
    .game-container {
      background: #1a0f08;
      border-radius: 16px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.9), 0 0 0 5px #8b7356;
      padding: 8px;
    }
    canvas {
      display: block;
      width: 900px;
      height: 550px;
      border-radius: 8px;
      background: #1a2a3a;
      cursor: none;
    }
    .info {
      text-align: center;
      margin-top: 12px;
      color: #ffd98c;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 #3a1f00;
    }
    .info kbd {
      background: #2d1e0e;
      padding: 4px 12px;
      border-radius: 24px;
      color: #ffe3a4;
      margin: 0 6px;
      border: 1px solid #c9a76b;
    }
  </style>
</head>
<body>
<div>
  <div class="game-container">
    <canvas id="gameCanvas" width="900" height="550"></canvas>
  </div>
  <div class="info">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> &nbsp;|&nbsp; <kbd>W</kbd> <kbd>S</kbd> <kbd>A</kbd> <kbd>D</kbd> &nbsp;|&nbsp; 🚗 DRIFT · SURVIVE &nbsp;|&nbsp; <kbd>R</kbd> RESTART
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CANVAS ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900, H = 550;
    const HORIZON_Y = 160;          // horizon line (pixels from top)

    // ---------- FIXED TIMESTEP ----------
    const FIXED_DT = 1/60;
    let accumulator = 0;
    let lastTimestamp = 0;
    let gameActive = true;
    let gameOver = false;
    let winFlag = false;

    // ---------- TRACK PARAMETERS (world units) ----------
    const SEGMENT_LENGTH = 200;
    const ROAD_WIDTH = 1400;
    const LANE_WIDTH = ROAD_WIDTH / 3;
    const CAMERA_HEIGHT = 1800;
    const CAMERA_DIST = 1.0;

    const TRACK_SEGMENTS = 300;
    let segments = [];
    let roadWorldX = new Float32Array(TRACK_SEGMENTS); // not used for rendering

    // ---------- PLAYER ----------
    let player = {
      segPos: 3.0,
      x: 0.0,
      dx: 0.0,
      speed: 70.0,
      maxSpeed: 480,
      accel: 220,
      brake: 320,
      turnSpeed: 4.5,
      grip: 0.92,
      offroadGrip: 0.70
    };

    // ---------- TIMER & CHECKPOINTS ----------
    let timer = 80.0;
    const CHECKPOINT_SEGMENTS = [40, 100, 160, 220, 280];
    let nextCheckpointIndex = 0;
    const TIME_GAIN = 14.0;

    // ---------- AI TRAFFIC ----------
    let traffic = [];
    const TRAFFIC_COUNT = 7;

    // ---------- INPUT ----------
    const keys = {
      ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
      KeyW: false, KeyS: false, KeyA: false, KeyD: false
    };

    // ---------- TRACK GENERATION ----------
    function buildTrack() {
      segments = [];
      for (let i = 0; i < TRACK_SEGMENTS; i++) {
        let curve = 0.0;
        let elevation = 0.0;
        let type = 'asphalt';

        if (i < 50) {
          curve = 0.0;
          elevation = Math.sin(i * 0.13) * 25;
        } else if (i < 90) {
          curve = 0.035;
          elevation = 25 + Math.sin(i * 0.2) * 35;
        } else if (i < 140) {
          curve = -0.030;
          elevation = 55 - (i-90) * 0.6;
        } else if (i < 190) {
          curve = -0.065;
          elevation = 45 + 70 * Math.sin((i-140) * 0.12);
          type = (i > 160 && i < 180) ? 'gravel' : 'asphalt';
        } else if (i < 240) {
          curve = 0.055;
          elevation = 30 + 50 * Math.cos(i * 0.1);
          type = (i > 210 && i < 230) ? 'gravel' : 'asphalt';
        } else {
          curve = -0.025;
          elevation = 20 + 35 * Math.sin(i * 0.08);
          type = 'asphalt';
        }
        if (i > 260 && i < 275) type = 'gravel';

        segments.push({ index: i, curve, elevation, type });
      }

      let accumX = 0;
      for (let i = 0; i < TRACK_SEGMENTS; i++) {
        roadWorldX[i] = accumX;
        accumX += segments[i].curve * SEGMENT_LENGTH;
      }
    }

    // ---------- RESET GAME ----------
    function resetGame() {
      buildTrack();
      player = {
        segPos: 4.0, x: 0.0, dx: 0.0, speed: 80.0,
        maxSpeed: 480, accel: 220, brake: 320, turnSpeed: 4.5,
        grip: 0.92, offroadGrip: 0.70
      };
      timer = 80.0;
      nextCheckpointIndex = 0;
      gameOver = false;
      winFlag = false;
      gameActive = true;

      traffic = [];
      for (let i = 0; i < TRAFFIC_COUNT; i++) {
        let seg = (i * 47 + 19) % TRACK_SEGMENTS;
        let lane = (i % 3 - 1) * LANE_WIDTH * 0.75;
        traffic.push({
          segPos: seg + 0.5,
          x: lane,
          speed: 65 + Math.random() * 90,
          width: 360,
          length: 600
        });
      }
    }

    // ---------- INPUT ----------
    function handleKeyDown(e) {
      const code = e.code;
      if (code in keys) { keys[code] = true; e.preventDefault(); }
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
      if (code === 'KeyR') { resetGame(); e.preventDefault(); }
    }
    function handleKeyUp(e) {
      const code = e.code;
      if (code in keys) { keys[code] = false; e.preventDefault(); }
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) e.preventDefault();
    }
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // ---------- UTILS ----------
    function getSegmentAt(pos) {
      let idx = Math.floor(pos);
      idx = ((idx % TRACK_SEGMENTS) + TRACK_SEGMENTS) % TRACK_SEGMENTS;
      return { segment: segments[idx], idx };
    }
    function getCurrentSurfaceGrip(pos) {
      let s = getSegmentAt(pos).segment;
      return s.type === 'gravel' ? player.offroadGrip : player.grip;
    }

    // ---------- PHYSICS UPDATE ----------
    function fixedUpdate(dt) {
      if (!gameActive || gameOver) return;

      const up = keys.ArrowUp || keys.KeyW;
      const down = keys.ArrowDown || keys.KeyS;
      const left = keys.ArrowLeft || keys.KeyA;
      const right = keys.ArrowRight || keys.KeyD;

      const surfaceGrip = getCurrentSurfaceGrip(player.segPos);

      if (up) player.speed += player.accel * dt;
      if (down) player.speed -= player.brake * dt;
      const friction = (surfaceGrip * 0.12) + 0.04;
      player.speed -= player.speed * friction * dt;
      player.speed = Math.min(player.maxSpeed, Math.max(8.0, player.speed));

      if (left || right) {
        const steer = (left ? -1 : 0) + (right ? 1 : 0);
        const turnFactor = Math.min(1.5, player.speed / 200);
        player.dx += steer * player.turnSpeed * dt * 45 * (0.4 + turnFactor);
      }

      player.dx *= (1.0 - surfaceGrip * 3.0 * dt);
      player.x += player.dx * dt * 2.2;

      const maxX = ROAD_WIDTH * 0.72;
      if (player.x > maxX) { player.x = maxX; player.dx *= -0.2; }
      if (player.x < -maxX) { player.x = -maxX; player.dx *= -0.2; }

      player.segPos += (player.speed / SEGMENT_LENGTH) * dt;
      if (player.segPos >= TRACK_SEGMENTS) player.segPos -= TRACK_SEGMENTS;
      if (player.segPos < 0) player.segPos += TRACK_SEGMENTS;

      for (let car of traffic) {
        car.segPos += (car.speed / SEGMENT_LENGTH) * dt;
        if (car.segPos >= TRACK_SEGMENTS) car.segPos -= TRACK_SEGMENTS;
        if (car.segPos < 0) car.segPos += TRACK_SEGMENTS;
      }

      for (let car of traffic) {
        let dist = Math.abs(car.segPos - player.segPos);
        if (dist > TRACK_SEGMENTS/2) dist = TRACK_SEGMENTS - dist;
        if (dist < 0.5 && Math.abs(car.x - player.x) < 550) {
          player.speed *= 0.76;
          player.dx += (player.x - car.x) * 0.08;
          car.segPos += 0.04;
        }
      }

      const curSeg = Math.floor(player.segPos);
      if (nextCheckpointIndex < CHECKPOINT_SEGMENTS.length) {
        const cp = CHECKPOINT_SEGMENTS[nextCheckpointIndex];
        if (curSeg >= cp && curSeg < cp + 12) {
          timer += TIME_GAIN;
          nextCheckpointIndex++;
        }
      }
      timer -= dt;
      if (timer <= 0.0) { timer = 0.0; gameOver = true; gameActive = false; }
      if (nextCheckpointIndex >= CHECKPOINT_SEGMENTS.length && timer > 5) winFlag = true;
    }

    // ---------- RENDERING ----------

    function drawPlayerCar() {
      const carY = H - 85;
      const carW = 150;
      const carH = 95;
      const carX = W/2 - carW/2;

      ctx.fillStyle = '#00000066';
      ctx.beginPath();
      ctx.ellipse(W/2, carY + carH*0.65, carW*0.65, 18, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = '#d1222a';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.rect(carX, carY, carW, carH);
      ctx.fill();

      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(carX+15, carY-15, carW-30, 32);
      
      ctx.fillStyle = '#333';
      ctx.fillRect(carX-8, carY+8, 14, 22);
      ctx.fillRect(carX+carW-6, carY+8, 14, 22);
      ctx.fillStyle = '#555';
      ctx.fillRect(carX-14, carY, carW+28, 10);

      ctx.shadowBlur = 24;
      ctx.fillStyle = '#ff3a3a';
      ctx.beginPath();
      ctx.arc(carX+22, carY+carH-14, 16, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ff5e00';
      ctx.beginPath();
      ctx.arc(carX+carW-22, carY+carH-14, 16, 0, Math.PI*2);
      ctx.fill();
      
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#f5e6d3';
      ctx.fillRect(carX+carW/2-20, carY+carH-20, 40, 16);
      ctx.fillStyle = '#222';
      ctx.font = 'bold 13px "Courier New", monospace';
      ctx.fillText('CRUISN', carX+carW/2-32, carY+carH-7);
      
      ctx.shadowBlur = 0;
      ctx.shadowColor = 'transparent';
    }

    function drawMountains() {
      // Distant mountain silhouette
      ctx.fillStyle = '#2d4a5e';
      ctx.beginPath();
      ctx.moveTo(0, HORIZON_Y);
      
      const peaks = 8;
      for (let i = 0; i <= peaks; i++) {
        let x = (i / peaks) * W;
        let height = 30 + 40 * Math.sin(i * 1.5) * Math.sin(i * 0.7);
        ctx.lineTo(x, HORIZON_Y - height);
      }
      ctx.lineTo(W, HORIZON_Y);
      ctx.lineTo(0, HORIZON_Y);
      ctx.closePath();
      ctx.fill();
      
      // Snow caps
      ctx.fillStyle = '#e0f0ff';
      ctx.beginPath();
      ctx.moveTo(0, HORIZON_Y);
      for (let i = 0; i <= peaks; i++) {
        let x = (i / peaks) * W;
        let height = 30 + 40 * Math.sin(i * 1.5) * Math.sin(i * 0.7);
        if (height > 45) {
          ctx.lineTo(x, HORIZON_Y - height + 10);
        } else {
          ctx.lineTo(x, HORIZON_Y - height);
        }
      }
      ctx.lineTo(W, HORIZON_Y);
      ctx.lineTo(0, HORIZON_Y);
      ctx.closePath();
      ctx.fill();
    }

    function renderRoad() {
      const playerSeg = player.segPos;
      const baseIdx = Math.floor(playerSeg);
      const drawDist = 120;

      let playerPercent = player.segPos - baseIdx;
      let playerSegData = segments[baseIdx];

      // ISSUE 1 FIX: Anchor curve sum to player's exact fractional position
      let curveSum = -segments[baseIdx].curve * playerPercent;

      let proj = [];
      for (let i = 0; i < drawDist; i++) {
        let segIdx = (baseIdx + i) % TRACK_SEGMENTS;
        let seg = segments[segIdx];
        
let z = (i - playerPercent) * SEGMENT_LENGTH;

// stable near-plane clamp (small, not 1)
if (z < 0.1) z = 0.1;

        if (i > 0) {
          let prevIdx = (baseIdx + i - 1) % TRACK_SEGMENTS;
          curveSum += segments[prevIdx].curve;
        }
        let worldOffset = curveSum * SEGMENT_LENGTH * 5.0;

        let scale = CAMERA_DIST / z;
        let camY = CAMERA_HEIGHT + (playerSegData.elevation - seg.elevation);
        let screenY = HORIZON_Y + camY * scale;
        let centerX = W/2 + (worldOffset - player.x) * scale;
        let roadW = ROAD_WIDTH * scale;

        proj.push({ seg, z, scale, screenY, centerX, roadW });
      }

      // Ground base
      ctx.fillStyle = '#2b6e3f';
      ctx.fillRect(0, HORIZON_Y, W, H - HORIZON_Y);

      // Road strips
      for (let i = proj.length - 2; i >= 0; i--) {
        const p1 = proj[i];
        const p2 = proj[i+1];

        const left1 = p1.centerX - p1.roadW/2;
        const right1 = p1.centerX + p1.roadW/2;
        const left2 = p2.centerX - p2.roadW/2;
        const right2 = p2.centerX + p2.roadW/2;

        ctx.fillStyle = p1.seg.type === 'gravel' ? '#a58e72' : '#3a4048';
        ctx.beginPath();
        ctx.moveTo(left1, p1.screenY);
        ctx.lineTo(right1, p1.screenY);
        ctx.lineTo(right2, p2.screenY);
        ctx.lineTo(left2, p2.screenY);
        ctx.closePath();
        ctx.fill();

        const rumbleW1 = p1.roadW * 0.05;
        const rumbleW2 = p2.roadW * 0.05;

        ctx.fillStyle = '#bb2f2f';
        ctx.beginPath();
        ctx.moveTo(left1 - rumbleW1, p1.screenY);
        ctx.lineTo(left1, p1.screenY);
        ctx.lineTo(left2, p2.screenY);
        ctx.lineTo(left2 - rumbleW2, p2.screenY);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(right1, p1.screenY);
        ctx.lineTo(right1 + rumbleW1, p1.screenY);
        ctx.lineTo(right2 + rumbleW2, p2.screenY);
        ctx.lineTo(right2, p2.screenY);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#f5e68b';
        ctx.lineWidth = Math.max(2, p1.scale * 8);
        ctx.setLineDash([25 * p1.scale, 35 * p1.scale]);
        ctx.beginPath();
        ctx.moveTo(p1.centerX, p1.screenY);
        ctx.lineTo(p2.centerX, p2.screenY);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = '#d4d4d4';
        ctx.lineWidth = Math.max(1.5, p1.scale * 5);
        ctx.beginPath();
        ctx.moveTo(left1+4, p1.screenY);
        ctx.lineTo(left2+4, p2.screenY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(right1-4, p1.screenY);
        ctx.lineTo(right2-4, p2.screenY);
        ctx.stroke();
      }

      // AI traffic (with anchored curve integration)
      for (let car of traffic) {
        let dist = car.segPos - player.segPos;
        if (dist < 0) dist += TRACK_SEGMENTS;
        let z = dist * SEGMENT_LENGTH;
        if (z < 5 || z > 8000) continue;
        
        // Anchor curve sum for AI car using player fractional offset
        let carCurveSum = -segments[baseIdx].curve * playerPercent;
        let steps = Math.floor(dist);
        let fractional = dist - steps;
        for (let j = 0; j < steps; j++) {
          let idx = (baseIdx + j) % TRACK_SEGMENTS;
          carCurveSum += segments[idx].curve;
        }
        if (fractional > 0) {
          let idx = (baseIdx + steps) % TRACK_SEGMENTS;
          carCurveSum += segments[idx].curve * fractional;
        }
        let worldOffset = carCurveSum * SEGMENT_LENGTH * 3.0;

        let scale = CAMERA_DIST / z;
        let segIdx = Math.floor(car.segPos) % TRACK_SEGMENTS;
        let seg = segments[segIdx];
        let camY = CAMERA_HEIGHT + (playerSegData.elevation - seg.elevation);
        let screenY = HORIZON_Y + camY * scale;
        let screenX = W/2 + (worldOffset - player.x + car.x) * scale;
        
        let cw = 600 * scale;
        let ch = 300 * scale;
        ctx.fillStyle = '#3a6ea5';
        ctx.fillRect(screenX - cw/2, screenY - ch*0.65, cw, ch);
        ctx.fillStyle = '#1e2f47';
        ctx.fillRect(screenX - cw/2+8, screenY - ch*0.45, cw-16, ch*0.5);
        ctx.fillStyle = '#e0b020';
        ctx.fillRect(screenX - cw/4, screenY - ch*0.85, cw/2, 12*scale);
      }

      // ISSUE 3: Improved roadside objects (trees left, poles right)
      for (let p of proj) {
        if (p.z < 700 || p.z > 5000) continue;
        const s = p.scale;
        const leftEdge = p.centerX - p.roadW/2;
        const rightEdge = p.centerX + p.roadW/2;
        const yBase = p.screenY;
        
        // Trees on left
        if (Math.sin(p.seg.index * 0.7) > 0.25) {
          const trunkW = 12 * s;
          const trunkH = 70 * s;
          ctx.fillStyle = '#6b4f32';
          ctx.fillRect(leftEdge - 45 * s - trunkW/2, yBase - trunkH, trunkW, trunkH);
          ctx.fillStyle = '#1f6e3f';
          ctx.beginPath();
          ctx.arc(leftEdge - 45 * s, yBase - trunkH - 15 * s, 28 * s, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#2a8e4f';
          ctx.beginPath();
          ctx.arc(leftEdge - 55 * s, yBase - trunkH - 25 * s, 20 * s, 0, Math.PI*2);
          ctx.fill();
        }
        
        // Poles on right
        if (Math.cos(p.seg.index) > 0.2) {
          const poleW = 10 * s;
          const poleH = 60 * s;
          ctx.fillStyle = '#a57c50';
          ctx.fillRect(rightEdge + 30 * s, yBase - poleH, poleW, poleH);
          ctx.fillStyle = '#c99f6c';
          ctx.beginPath();
          ctx.arc(rightEdge + 35 * s, yBase - poleH - 5 * s, 12 * s, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }

    function drawHUD() {
      ctx.font = 'bold 28px "Courier New", monospace';
      ctx.fillStyle = '#f2e8d5';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 10;
      ctx.fillText(`⚡ ${Math.floor(player.speed * 0.18)} mph`, 30, 60);
      
      ctx.font = 'bold 34px monospace';
      ctx.fillStyle = timer < 15 ? '#ff7060' : '#e0f2b0';
      ctx.fillText(`⏱️ ${Math.ceil(timer)}`, W-190, 70);
      
      ctx.font = '22px monospace';
      ctx.fillStyle = '#b8d9fc';
      ctx.fillText(`CHECK: ${nextCheckpointIndex}/${CHECKPOINT_SEGMENTS.length}`, 30, 110);
      
      let surf = getSegmentAt(player.segPos).segment.type;
      ctx.fillStyle = surf==='gravel' ? '#cb9e72' : '#a0b0c0';
      ctx.fillText(`🛞 ${surf.toUpperCase()}`, 30, 150);
      ctx.shadowBlur = 0;
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      
      // Sky
      const grad = ctx.createLinearGradient(0, 0, 0, HORIZON_Y+60);
      grad.addColorStop(0, '#0a1c2f');
      grad.addColorStop(0.8, '#5f9fc0');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, HORIZON_Y+40);
      
      // Sun
      ctx.fillStyle = '#fcd48c';
      ctx.beginPath();
      ctx.arc(W*0.75, HORIZON_Y-25, 45, 0, Math.PI*2);
      ctx.fill();
      
      // ISSUE 2: Distant mountains
      drawMountains();
      
      renderRoad();
      drawPlayerCar();
      drawHUD();

      if (gameOver) {
        ctx.fillStyle = '#000000cc';
        ctx.fillRect(0, 0, W, H);
        ctx.font = '48px "Courier New", monospace';
        ctx.fillStyle = '#f55';
        ctx.fillText('GAME OVER', W/2-170, H/2);
      } else if (winFlag) {
        ctx.fillStyle = '#d4af37';
        ctx.font = '40px monospace';
        ctx.fillText('🏆 YOU SURVIVED! 🏆', W/2-240, H/2-20);
      }
    }

    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      if (!lastTimestamp) { lastTimestamp = now; return; }
      let delta = Math.min(0.03, (now - lastTimestamp) / 1000);
      lastTimestamp = now;

      if (gameActive && !gameOver) {
        accumulator += delta;
        while (accumulator >= FIXED_DT) {
          fixedUpdate(FIXED_DT);
          accumulator -= FIXED_DT;
        }
      }
      render();
    }

    resetGame();
    requestAnimationFrame(gameLoop);
  })();
</script>
</body>
</html>
