<!DOCTYPE html>
<html>
<head>
  <title>The Pit Walk Racer</title>
</head>
<body style="margin:0; overflow:hidden; background:black;">

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== GAME STATE =====
let playerX = 0;
let speed = 0;
let maxSpeed = 200;
let position = 0;
let trackLength = 5000;

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ===== ROAD =====
const segments = [];

for (let i = 0; i < 200; i++) {
  segments.push({
    curve: Math.sin(i * 0.1) * 2,
    y: Math.sin(i * 0.05) * 50
  });
}

// ===== UPDATE =====
function update() {

  if (keys["ArrowUp"]) speed += 2;
  if (keys["ArrowDown"]) speed -= 3;

  speed = Math.max(0, Math.min(maxSpeed, speed));

  if (keys["ArrowLeft"]) playerX -= 0.05;
  if (keys["ArrowRight"]) playerX += 0.05;

  position += speed * 0.02;

  if (Math.abs(playerX) > 1) speed *= 0.95;
}

// ===== DRAW ROAD =====
function drawRoad() {

  let base = Math.floor(position) % segments.length;
  let x = 0;

  for (let i = 0; i < 100; i++) {

    let seg = segments[(base + i) % segments.length];
    let scale = 1 - i / 100;

    let width = canvas.width * scale * 0.8;
    let y = canvas.height - i * 8;

    x += seg.curve * 0.5;

    ctx.fillStyle = i % 2 ? "#444" : "#555";

    ctx.fillRect(
      canvas.width/2 - width/2 + x*50,
      y,
      width,
      8
    );
  }
}

// ===== DRAW CAR =====
function drawCar() {
  ctx.fillStyle = "#ffd100";
  ctx.fillRect(canvas.width/2 - 20 + playerX*200, canvas.height - 80, 40, 60);
}

// ===== RENDER =====
function render() {

  // sky
  ctx.fillStyle = "#4da6ff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawRoad();
  drawCar();

  // speedometer
  ctx.fillStyle = "#000";
  ctx.fillRect(canvas.width - 180, canvas.height - 80, 160, 60);

  ctx.fillStyle = "#ffd100";
  ctx.font = "20px Arial";
  ctx.textAlign = "right";
  ctx.fillText(Math.floor(speed) + " km/h", canvas.width - 30, canvas.height - 40);
}

// ===== LOOP =====
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
