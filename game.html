<!DOCTYPE html>
<html>
<head>
  <title>The Pit Walk Racer</title>
</head>
<body style="margin:0; overflow:hidden; background:black;">

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== CORE =====
let playerX = 0;
let speed = 0;
let maxSpeed = 20;
let roadWidth = 2000;
let segmentLength = 120;
let cameraHeight = 1000;
let cameraDepth = 1 / Math.tan((90/2) * Math.PI/180);
let position = 0;
let trackTime = 0;

// ===== CAR IMAGE (RELIABLE) =====
const carImg = new Image();
carImg.src = "https://raw.githubusercontent.com/jakesgordon/javascript-racer/master/images/player.png";

// ===== TRACK =====
function buildTrack() {
  let arr = [];

  function addStraight(length) {
    for (let i = 0; i < length; i++) {
      arr.push({ z: arr.length * segmentLength, curve: 0, y: 0 });
    }
  }

  function addCorner(enter, hold, exit, curveStrength) {
    for (let i = 0; i < enter; i++) {
      let p = i / enter;
      arr.push({ z: arr.length * segmentLength, curve: curveStrength * p, y: 0 });
    }
    for (let i = 0; i < hold; i++) {
      arr.push({ z: arr.length * segmentLength, curve: curveStrength, y: 0 });
    }
    for (let i = 0; i < exit; i++) {
      let p = 1 - i / exit;
      arr.push({ z: arr.length * segmentLength, curve: curveStrength * p, y: 0 });
    }
  }

  addStraight(40);
  addCorner(20,20,20,1.5);
  addCorner(30,30,30,-3);
  addStraight(40);
  addCorner(20,30,20,3);
  addStraight(60);
  addCorner(20,20,20,1.5);
  addStraight(40);
  addCorner(20,20,20,4);
  addCorner(20,20,20,-2);
  addStraight(60);
  addCorner(20,30,20,3);
  addCorner(20,30,20,-3);
  addCorner(20,20,20,4);

  return arr;
}

let road = buildTrack();

// ===== INPUT =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ===== PROJECT =====
function project(p, cameraX, cameraZ) {
  let dz = p.z - cameraZ;
  if (dz <= 0) return null;

  let scale = cameraDepth / dz;

  return {
    x: (1 + scale * (p.x - cameraX)) * canvas.width / 2,
    y: (1 - scale * (p.y - cameraHeight)) * canvas.height / 2,
    w: scale * roadWidth * canvas.width / 2,
    scale: scale
  };
}

// ===== BACKGROUND =====
function drawBackground(curve) {

  let sky = ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,"#4da6ff");
  sky.addColorStop(1,"#87CEEB");

  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#2c3e50";

  let baseY = canvas.height * 0.4;
  let offset = curve * 0.2;

  ctx.beginPath();
  ctx.moveTo(0, baseY);

  for (let i=0;i<canvas.width;i+=100){
    let y = Math.sin(i*0.01 + offset) * 40 + baseY;
    ctx.lineTo(i,y);
  }

  ctx.lineTo(canvas.width,canvas.height);
  ctx.lineTo(0,canvas.height);
  ctx.fill();
}

// ===== ROAD =====
function drawSegment(p1,p2,i){

  let grass = i%2 ? "#2ecc71" : "#27ae60";
  let rumble = i%2 ? "#fff" : "#f00";

  ctx.fillStyle = grass;
  ctx.fillRect(0,p2.y,canvas.width,p1.y-p2.y);

  let rw1 = p1.w*1.2;
  let rw2 = p2.w*1.2;

  ctx.fillStyle = rumble;

  ctx.beginPath();
  ctx.moveTo(p1.x-rw1,p1.y);
  ctx.lineTo(p1.x-p1.w,p1.y);
  ctx.lineTo(p2.x-p2.w,p2.y);
  ctx.lineTo(p2.x-rw2,p2.y);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(p1.x+p1.w,p1.y);
  ctx.lineTo(p1.x+rw1,p1.y);
  ctx.lineTo(p2.x+rw2,p2.y);
  ctx.lineTo(p2.x+p2.w,p2.y);
  ctx.fill();

  ctx.fillStyle = "#444";
  ctx.beginPath();
  ctx.moveTo(p1.x-p1.w,p1.y);
  ctx.lineTo(p1.x+p1.w,p1.y);
  ctx.lineTo(p2.x+p2.w,p2.y);
  ctx.lineTo(p2.x-p2.w,p2.y);
  ctx.fill();
}

// ===== UPDATE =====
function update(){

  if(keys["ArrowUp"]) speed += 0.4;
  if(keys["ArrowDown"]) speed -= 0.3;

  speed = Math.max(0,Math.min(14,speed));

  if(keys["ArrowLeft"]) playerX -= 0.03*speed;
  if(keys["ArrowRight"]) playerX += 0.03*speed;

  if(Math.abs(playerX)>1.2) speed *= 0.95;

  position += speed;

  let base = Math.floor(position/segmentLength);
  let look = road[(base+10)%road.length];
  let corner = Math.abs(look.curve);

  if(corner>2 && speed>10){
    speed -= corner*0.3;
    playerX -= look.curve*0.008*speed;
  }

  trackTime += 1/60;
}

// ===== CAMERA =====
let camOffset = 0;

// ===== RENDER =====
function render(){

  let base = Math.floor(position/segmentLength);
  let percent = (position%segmentLength)/segmentLength;

  let curveSum = 0;
  for(let i=0;i<20;i++){
    curveSum += road[(base+i)%road.length].curve;
  }

  drawBackground(curveSum);

  camOffset += (curveSum*30 - camOffset)*0.08;

  let cameraX = playerX*roadWidth + camOffset;
  let cameraZ = position;

  let maxY = canvas.height;

  for(let i=0;i<300;i++){

    let curr = road[(base+i)%road.length];
    let next = road[(base+i+1)%road.length];

    let p1 = { x: curr.curve*roadWidth, y: curr.y, z: curr.z - percent*segmentLength };
    let p2 = { x: next.curve*roadWidth, y: next.y, z: next.z - percent*segmentLength };

    let proj1 = project(p1,cameraX,cameraZ);
    let proj2 = project(p2,cameraX,cameraZ);

    if(!proj1 || !proj2) continue;
    if(proj1.y>=maxY) continue;

    drawSegment(proj1,proj2,i);
    maxY = proj1.y;
  }

  // ===== CAR SPRITE =====
  let carX = canvas.width/2 + playerX*200;
  let carY = canvas.height - 140;

  if (carImg.complete) {
    ctx.save();
    ctx.translate(carX, carY);
    ctx.rotate(-playerX * 0.3);
    ctx.drawImage(carImg, -40, -70, 80, 140);
    ctx.restore();
  }

  // HUD
  ctx.fillStyle="#fff";
  ctx.font="20px Arial";
  ctx.fillText("Time: "+Math.floor(trackTime),20,30);
}

// ===== LOOP =====
function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
