<!DOCTYPE html>
<html>
<head>
  <title>The Pit Walk Racer</title>
</head>
<body style="margin:0; overflow:hidden; background:black;">

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== CORE VARIABLES =====
let playerX = 0;
let speed = 0;
let maxSpeed = 20;
let roadWidth = 2000;
let segmentLength = 120;
let cameraHeight = 1000;
let cameraDepth = 1 / Math.tan((90/2) * Math.PI/180);
let position = 0;

let currentTrackIndex = 0;
let trackTime = 0;
let inTransition = false;
let transitionTime = 0;

// ===== CARS =====
const cars = [
  { name: "Drift Car", maxSpeed: 10, color: "#9b59b6" },
  { name: "Circuit Car", maxSpeed: 14, color: "#ffd100" }
];

// ===== TRACKS =====
const tracks = [
  {
    name: "Mallala",
build: () => {
  let arr = [];

function addCurve(length, maxCurve, hill = 0, camber = 0) {
  for (let i = 0; i < length; i++) {
    let progress = i / length;

    // smooth curve
    let curve = Math.sin(progress * Math.PI) * maxCurve;

    // smooth hill (up then down)
    let y = Math.sin(progress * Math.PI) * hill;

    // camber follows curve shape
    let tilt = Math.sin(progress * Math.PI) * camber;

    arr.push({
      z: arr.length * segmentLength,
      curve: curve,
      y: y,
      tilt: tilt
    });
  }
}

function addStraight(length, hill = 0) {
  for (let i = 0; i < length; i++) {
    arr.push({
      z: arr.length * segmentLength,
      curve: 0,
      y: hill,
      tilt: 0
    });
  }
}

  // ===== START =====
addStraight(40);

// gentle right (slight camber)
addCurve(40, 1.5, 0, 0.3);

// wide left hairpin (banked)
addCurve(60, -3, 0, -0.5);

addStraight(40);

// right hairpin
addCurve(50, 3, 0, 0.5);

addStraight(60);

// Turn 4 — gentle rise then fall
addCurve(40, 1.5, 200, 0.2);

addStraight(40);

// tight right
addCurve(40, 4.5, 0, 0.6);

// flowing section
addCurve(40, -2, 0, -0.3);

addStraight(60);

// right hairpin
addCurve(50, 3, 0, 0.5);

// left hairpin
addCurve(50, -3, 0, -0.5);

// final corner
addCurve(40, 5, 0, 0.7);
  return arr;
}
  },
  {
    name: "The Bend",
    build: () => {
      let arr = [];
      for (let i = 0; i < 500; i++) {
        arr.push({
          z: i * segmentLength,
          curve: Math.sin(i * 0.08) * 4
        });
      }
      return arr;
    }
  }
];

// ===== INPUT =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ===== INIT =====
let road = tracks[0].build();
let currentCar = cars[0];

// ===== PROJECTION =====
function project(p, cameraX, cameraY, cameraZ) {
  let scale = cameraDepth / (p.z - cameraZ);
  return {
    x: (1 + scale * (p.x - cameraX)) * canvas.width / 2,
    y: (1 - scale * (p.y - cameraY)) * canvas.height / 2,
    w: scale * roadWidth * canvas.width / 2
  };
}

// ===== DRAW ROAD =====
function drawSegment(p1, p2, index) {
  let grassColor = (index % 2 === 0) ? "#2ecc71" : "#27ae60";
  let rumbleColor = (index % 2 === 0) ? "#ff0000" : "#ffffff";

  ctx.fillStyle = grassColor;
  ctx.fillRect(0, p2.y, canvas.width, p1.y - p2.y);

  let rumbleWidth1 = p1.w * 1.2;
  let rumbleWidth2 = p2.w * 1.2;

  ctx.fillStyle = rumbleColor;

  ctx.beginPath();
  ctx.moveTo(p1.x - rumbleWidth1, p1.y);
  ctx.lineTo(p1.x - p1.w, p1.y);
  ctx.lineTo(p2.x - p2.w, p2.y);
  ctx.lineTo(p2.x - rumbleWidth2, p2.y);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(p1.x + p1.w, p1.y);
  ctx.lineTo(p1.x + rumbleWidth1, p1.y);
  ctx.lineTo(p2.x + rumbleWidth2, p2.y);
  ctx.lineTo(p2.x + p2.w, p2.y);
  ctx.fill();

  ctx.fillStyle = "#444";
  ctx.beginPath();
  ctx.moveTo(p1.x - p1.w, p1.y);
  ctx.lineTo(p1.x + p1.w, p1.y);
  ctx.lineTo(p2.x + p2.w, p2.y);
  ctx.lineTo(p2.x - p2.w, p2.y);
  ctx.fill();
}

// ===== SCENERY =====
function drawSprite(x, y, scale, type) {
  const size = scale * 200;

  if (type === "tree") {
    ctx.fillStyle = "#8e5a2b";
    ctx.fillRect(x - size*0.1, y - size*0.5, size*0.2, size*0.5);

    ctx.fillStyle = "#2ecc71";
    ctx.beginPath();
    ctx.arc(x, y - size*0.6, size*0.4, 0, Math.PI*2);
    ctx.fill();
  }
}

// ===== TRACK SWITCH =====
function nextTrack() {
  currentTrackIndex = (currentTrackIndex + 1) % tracks.length;

  road = tracks[currentTrackIndex].build();
  currentCar = cars[currentTrackIndex % cars.length];

  position = 0;
  trackTime = 0;
  inTransition = false;
}

// ===== UPDATE =====
function update() {
  if (keys["ArrowUp"]) speed += 0.4;
  if (keys["ArrowDown"]) speed -= 0.3;

  maxSpeed = currentCar.maxSpeed;
  speed = Math.max(0, Math.min(maxSpeed, speed));

  if (keys["ArrowLeft"]) playerX -= 0.05 * speed;
  if (keys["ArrowRight"]) playerX += 0.05 * speed;

  position += speed;

  if (!inTransition) {
    trackTime += 1/60;
    if (trackTime >= 30) {
      inTransition = true;
      transitionTime = 0;
    }
  } else {
    transitionTime += 1/60;
    if (transitionTime >= 5) nextTrack();
  }
}
let cameraOffset = 0;
// ===== RENDER =====
function render() {

  if (inTransition) {
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#ffd100";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.fillText(
      "Driving to " + tracks[(currentTrackIndex+1)%tracks.length].name,
      canvas.width/2,
      canvas.height/2
    );
    return;
  }

  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let baseSegment = Math.floor(position / segmentLength);
  let basePercent = (position % segmentLength) / segmentLength;
  let lookAhead = road[(baseSegment + 20) % road.length];
canvas.style.transform = `rotate(${lookAhead.curve * 2}deg)`;
  
cameraOffset += (lookAhead.curve * 1500 - cameraOffset) * 0.1;
let cameraX = playerX * roadWidth + cameraOffset;
  let cameraZ = position;

  let maxY = canvas.height;

  for (let i = 0; i < 300; i++) {
    let curr = road[(baseSegment+i)%road.length];
    let next = road[(baseSegment+i+1)%road.length];

    let p1 = { x: curr.curve * roadWidth + (curr.tilt || 0) * 200, y: curr.y, z: curr.z - basePercent*segmentLength };
    let p2 = { x: next.curve * roadWidth + (next.tilt || 0) * 200, y: next.y, z: next.z - basePercent*segmentLength };

    if (p1.z <= cameraZ || p2.z <= cameraZ) continue;

    let proj1 = project(p1, cameraX, cameraHeight, cameraZ);
    let proj2 = project(p2, cameraX, cameraHeight, cameraZ);

    let scale = proj1.w / (roadWidth * canvas.width / 2);

    if (i % 20 === 0) {
      drawSprite(proj1.x - proj1.w - 100, proj1.y, scale, "tree");
      drawSprite(proj1.x + proj1.w + 100, proj1.y, scale, "tree");
    }

    if (proj1.y >= maxY) continue;

    drawSegment(proj1, proj2, i);
    maxY = proj1.y;
  }

  ctx.fillStyle = currentCar.color;
  ctx.fillRect(canvas.width/2 - 25 + playerX*200, canvas.height-100, 50, 80);

  ctx.fillStyle = "#fff";
  ctx.font = "20px Arial";
  ctx.fillText("Track: " + tracks[currentTrackIndex].name, 20, 30);
  ctx.fillText("Time: " + Math.floor(trackTime), 20, 60);
}

// ===== LOOP =====
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
