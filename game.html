<!DOCTYPE html>
<html>
<head>
  <title>The Pit Walk Racer</title>
</head>
<body style="margin:0; overflow:hidden; background:black;">

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let playerX = 0;
let speed = 0;
let maxSpeed = 10;
let roadWidth = 2000;
let segmentLength = 200;
let cameraHeight = 1000;
let cameraDepth = 1 / Math.tan((90/2) * Math.PI/180);
let position = 0;
let currentTrackIndex = 0;
let trackTime = 0;
let inTransition = false;
let transitionTime = 0;

const cars = [
  { name: "Drift Car", maxSpeed: 10, color: "#9b59b6" },
  { name: "Circuit Car", maxSpeed: 14, color: "#ffd100" }
];

const tracks = [
  {
    name: "Mallala",
    build: () => {
      let arr = [];
      for (let i = 0; i < 500; i++) {
        arr.push({
          z: i * segmentLength,
          curve: Math.sin(i * 0.05) * 2
        });
      }
      return arr;
    }
  },
  {
    name: "The Bend",
    build: () => {
      let arr = [];
      for (let i = 0; i < 500; i++) {
        arr.push({
          z: i * segmentLength,
          curve: Math.sin(i * 0.08) * 4
        });
      }
      return arr;
    }
  }
];
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Road definition
let road = tracks[0].build();
let currentCar = cars[0];

function project(p, cameraX, cameraY, cameraZ) {
  let scale = cameraDepth / (p.z - cameraZ);
  return {
    x: (1 + scale * (p.x - cameraX)) * canvas.width / 2,
    y: (1 - scale * (p.y - cameraY)) * canvas.height / 2,
    w: scale * roadWidth * canvas.width / 2
  };
}

function drawSegment(p1, p2, index) {

  // alternating colours
  let grassColor = (index % 2 === 0) ? "#2ecc71" : "#27ae60";
  let rumbleColor = (index % 2 === 0) ? "#ff0000" : "#ffffff";
  let roadColor = "#444";

  // GRASS (full width)
  ctx.fillStyle = grassColor;
  ctx.fillRect(0, p2.y, canvas.width, p1.y - p2.y);

  // RUMBLE STRIPS
  let rumbleWidth1 = p1.w * 1.2;
  let rumbleWidth2 = p2.w * 1.2;

  ctx.fillStyle = rumbleColor;
  ctx.beginPath();
  ctx.moveTo(p1.x - rumbleWidth1, p1.y);
  ctx.lineTo(p1.x - p1.w, p1.y);
  ctx.lineTo(p2.x - p2.w, p2.y);
  ctx.lineTo(p2.x - rumbleWidth2, p2.y);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(p1.x + p1.w, p1.y);
  ctx.lineTo(p1.x + rumbleWidth1, p1.y);
  ctx.lineTo(p2.x + rumbleWidth2, p2.y);
  ctx.lineTo(p2.x + p2.w, p2.y);
  ctx.closePath();
  ctx.fill();

  // ROAD
  ctx.fillStyle = roadColor;
  ctx.beginPath();
  ctx.moveTo(p1.x - p1.w, p1.y);
  ctx.lineTo(p1.x + p1.w, p1.y);
  ctx.lineTo(p2.x + p2.w, p2.y);
  ctx.lineTo(p2.x - p2.w, p2.y);
  ctx.closePath();
  ctx.fill();

  // LANE STRIPES
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.stroke();
}
function nextTrack() {
  currentTrackIndex = (currentTrackIndex + 1) % tracks.length;

  road = tracks[currentTrackIndex].build();
  currentCar = cars[currentTrackIndex % cars.length];

  position = 0;
  trackTime = 0;
  inTransition = false;
}
function update() {

  // Controls
  if (keys["ArrowUp"]) speed += 0.2;
  if (keys["ArrowDown"]) speed -= 0.3;

  speed = Math.max(0, Math.min(maxSpeed, speed));

  if (keys["ArrowLeft"]) playerX -= 0.05 * speed;
  if (keys["ArrowRight"]) playerX += 0.05 * speed;

  position += speed;
  // Track timing
if (!inTransition) {
  trackTime += 1/60;

  if (trackTime >= 30) {
    inTransition = true;
    transitionTime = 0;
  }
} else {
  transitionTime += 1/60;

  if (transitionTime >= 5) {
    nextTrack();
  }
}
}
function drawSprite(x, y, scale, type) {

  const size = scale * 200;

  if (type === "tree") {
    // trunk
    ctx.fillStyle = "#8e5a2b";
    ctx.fillRect(x - size * 0.1, y - size * 0.5, size * 0.2, size * 0.5);

    // leaves
    ctx.fillStyle = "#2ecc71";
    ctx.beginPath();
    ctx.arc(x, y - size * 0.6, size * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (type === "pole") {
    ctx.fillStyle = "#ccc";
    ctx.fillRect(x - size * 0.05, y - size, size * 0.1, size);
  }
}
function render() {
if (inTransition) {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ffd100";
  ctx.font = "40px Arial";
  ctx.textAlign = "center";

  ctx.fillText(
    "Driving to " + tracks[(currentTrackIndex + 1) % tracks.length].name,
    canvas.width / 2,
    canvas.height / 2
  );

  return;
}
ctx.fillStyle = "#fff";
ctx.font = "20px Arial";
ctx.textAlign = "left";

ctx.fillText("Track: " + tracks[currentTrackIndex].name, 20, 30);
ctx.fillText("Time: " + Math.floor(trackTime), 20, 60);
 }
  ctx.fillStyle = "#87CEEB"; // sky
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let baseSegment = Math.floor(position / segmentLength);
  let basePercent = (position % segmentLength) / segmentLength;

  let cameraX = playerX * roadWidth;
  let cameraY = cameraHeight;
  let cameraZ = position;

  let maxY = canvas.height;

  for (let i = 0; i < 300; i++) {
    let curr = road[(baseSegment + i) % road.length];
    let next = road[(baseSegment + i + 1) % road.length];

    let p1 = {
      x: curr.curve * roadWidth,
      y: 0,
      z: curr.z - basePercent * segmentLength
    };

    let p2 = {
      x: next.curve * roadWidth,
      y: 0,
      z: next.z - basePercent * segmentLength
    };

    let proj1 = project(p1, cameraX, cameraY, cameraZ);
    let proj2 = project(p2, cameraX, cameraY, cameraZ);
    if (p1.z <= cameraZ || p2.z <= cameraZ) continue;
// scale based on distance
let scale = proj1.w / (roadWidth * canvas.width / 2);

// spacing
if (i % 20 === 0) {
  // left side tree
  drawSprite(proj1.x - proj1.w - 100, proj1.y, scale, "tree");

  // right side tree
  drawSprite(proj1.x + proj1.w + 100, proj1.y, scale, "tree");
}

// poles more frequent
if (i % 10 === 0) {
  drawSprite(proj1.x - proj1.w - 50, proj1.y, scale, "pole");
  drawSprite(proj1.x + proj1.w + 50, proj1.y, scale, "pole");
}
    if (proj1.y >= maxY) continue;

drawSegment(proj1, proj2, i);

    maxY = proj1.y;
  }

  // Player car
  ctx.fillStyle = "#ffd100";
  ctx.fillRect(canvas.width/2 - 25 + playerX * 200, canvas.height - 100, 50, 80);
}

function loop() {
  update()
    maxSpeed = currentCar.maxSpeed;;
  render();
  requestAnimationFrame(loop);
  ctx.fillStyle = "#fff";
ctx.font = "20px Arial";
ctx.textAlign = "left";

ctx.fillText("Track: " + tracks[currentTrackIndex].name, 20, 30);
ctx.fillText("Time: " + Math.floor(trackTime), 20, 60);
}

loop();
</script>

</body>
</html>
