<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calendar - The Pit Walk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#0d0d0d; color:#fff; }
header { background:#000; padding:20px; text-align:center; border-bottom:3px solid #ffd100; }
header h1 { color:#ffd100; margin:0; }

nav a { color:#fff; margin:0 15px; text-decoration:none; font-weight:bold; }

.section { padding:20px; max-width:1100px; margin:auto; }

.controls { text-align:center; margin-bottom:10px; }
button { background:#ffd100; border:none; padding:8px 15px; margin:5px; font-weight:bold; cursor:pointer; }

.calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.day-name { text-align:center; color:#ffd100; font-weight:bold; }
.day { background:#1a1a1a; min-height:100px; padding:5px; border-radius:6px; }

.date { font-size:12px; color:#aaa; }

.event {
  background:#ffd100;
  color:#000;
  margin-top:5px;
  padding:3px;
  border-radius:4px;
  font-size:12px;
  cursor:pointer;
}

form { margin-top:30px; background:#1a1a1a; padding:20px; border-radius:10px; }
input, select, textarea { width:100%; margin-bottom:10px; padding:8px; border:none; border-radius:5px; }

/* POPUP */
.popup {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content {
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  max-width:400px;
}

.popup a {
  display:inline-block;
  margin-top:10px;
  background:#ffd100;
  color:#000;
  padding:8px 15px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>THE PIT WALK</h1>
<nav>
<a href="index.html">Home</a>
<a href="calendar.html">Calendar</a>
<a href="gallery.html">Gallery</a>
<a href="ai.html">AI Articles</a>
</nav>
</header>

<section class="section">

<div class="controls">
<button onclick="changeMonth(-1)">⬅</button>
<span id="monthLabel"></span>
<button onclick="changeMonth(1)">➡</button>
</div>

<div class="calendar" id="calendar"></div>

<h2>Submit Event</h2>

<form onsubmit="submitEvent(event)">
<input type="text" id="name" placeholder="Event Name" required>
<input type="date" id="date" required>

<select id="location" required>
<option value="">Select Location</option>
<option>Mallala (Circuit)</option>
<option>The Bend (Circuit)</option>
<option>Collingrove (Hillclimb)</option>
<option>Victoria Park (Circuit)</option>
<option>Adelaide International Raceway</option>
</select>

<select id="discipline" required>
<option value="">Select Discipline</option>
<option>Drifting</option>
<option>Track Day</option>
<option>Drag Racing</option>
<option>Hillclimb</option>
</select>

<textarea id="description" placeholder="Description" required></textarea>
<input type="url" id="link" placeholder="Facebook link" required>

<button type="submit">Submit</button>
</form>

</section>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup()">
  <div class="popup-content" onclick="event.stopPropagation()">
    <h3 id="pName"></h3>
    <p id="pDate"></p>
    <p id="pLocation"></p>
    <p id="pDiscipline"></p>
    <p id="pDesc"></p>
    <a id="pLink" target="_blank">View Event</a>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCD2ZrGovFh1EkHIXp943WHAV8kcGW8-UY",
  authDomain: "pit-walk.firebaseapp.com",
  projectId: "pit-walk",
  storageBucket: "pit-walk.firebasestorage.app",
  messagingSenderId: "620584957013",
  appId: "1:620584957013:web:24171e30ad7614573690dc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let events = [];
let currentDate = new Date();

db.collection("events").onSnapshot(snapshot => {
  events = [];
  snapshot.forEach(doc => events.push(doc.data()));
  generateCalendar();
});

function generateCalendar(){
  const cal = document.getElementById('calendar');
  cal.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById('monthLabel').textContent =
    currentDate.toLocaleString('default', { month:'long', year:'numeric' });

  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();

  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
    let el=document.createElement('div');
    el.className='day-name';
    el.textContent=d;
    cal.appendChild(el);
  });

  for(let i=0;i<firstDay;i++) cal.appendChild(document.createElement('div'));

  for(let d=1; d<=days; d++){
    let div=document.createElement('div');
    div.className='day';

    let dateDiv=document.createElement('div');
    dateDiv.className='date';
    dateDiv.textContent=d;
    div.appendChild(dateDiv);

    let fullDate=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    events.forEach(ev=>{
      if(ev.date===fullDate){
        let e=document.createElement('div');
        e.className='event';
        e.textContent = ev.name || ev.discipline;

        e.onclick = () => showPopup(ev);

        div.appendChild(e);
      }
    });

    cal.appendChild(div);
  }
}

function changeMonth(dir){
  currentDate.setMonth(currentDate.getMonth()+dir);
  generateCalendar();
}

function submitEvent(e){
  e.preventDefault();

  db.collection("events").add({
    name: document.getElementById('name').value,
    date: document.getElementById('date').value,
    location: document.getElementById('location').value,
    discipline: document.getElementById('discipline').value,
    description: document.getElementById('description').value,
    link: document.getElementById('link').value
  });

  alert("Event submitted!");
}

function showPopup(ev){
  document.getElementById('popup').style.display = "flex";
  document.getElementById('pName').textContent = ev.name;
  document.getElementById('pDate').textContent = "Date: " + ev.date;
  document.getElementById('pLocation').textContent = "Location: " + ev.location;
  document.getElementById('pDiscipline').textContent = "Discipline: " + ev.discipline;
  document.getElementById('pDesc').textContent = ev.description;
  document.getElementById('pLink').href = ev.link;
}

function closePopup(){
  document.getElementById('popup').style.display = "none";
}
</script>

</body>
</html>
