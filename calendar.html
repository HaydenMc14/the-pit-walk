<script>
const firebaseConfig = {
  apiKey: "AIzaSyCD2ZrGovFh1EkHIXp943WHAV8kcGW8-UY",
  authDomain: "pit-walk.firebaseapp.com",
  projectId: "pit-walk",
  storageBucket: "pit-walk.firebasestorage.app",
  messagingSenderId: "620584957013",
  appId: "1:620584957013:web:24171e30ad7614573690dc"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let events = [];
let currentDate = new Date();

db.collection("events").onSnapshot(snapshot => {
  events = [];
  snapshot.forEach(doc => events.push(doc.data()));
function isThisWeek(dateString) {
  const today = new Date();
  today.setHours(0,0,0,0);

  const endDate = new Date(today);
  endDate.setDate(today.getDate() + 7);

  const eventDate = new Date(dateString);

  return eventDate >= today && eventDate <= endDate;
}
function renderWeekEvents() {
  const container = document.getElementById("weekEvents");

  const upcoming = events.filter(ev => isThisWeek(ev.date));

  if (upcoming.length === 0) {
    container.innerHTML = "";
    return;
  }

  // sort by date
  upcoming.sort((a, b) => new Date(a.date) - new Date(b.date));

  let html = `
    <div style="background:#1a1a1a; padding:15px; border-radius:10px; border-left:5px solid #CC5500;">
      <h2 style="margin-top:0; color:#CC5500;">🏁 Next 7 Days 🏁</h2>
  `;

  upcoming.forEach((ev, i) => {
    html += `
      <div id="week-${i}" style="margin-bottom:10px; cursor:pointer;">
        <strong>${ev.name}</strong><br>
const formatted = formatEventDate(ev.date);
const parts = formatted.split(" - ");

html += `
  <div id="week-${i}" style="margin-bottom:10px; cursor:pointer;">
    <strong>${ev.name}</strong><br>
    <span style="font-size:12px; color:#ccc;">
      ${ev.location} • ${parts[0]} - <strong>${parts[1]}</strong>
    </span>
  </div>
`;
      </div>
    `;
  });

  html += "</div>";

  container.innerHTML = html;

  // attach click handlers safely
  setTimeout(() => {
    upcoming.forEach((ev, i) => {
      const el = document.getElementById(`week-${i}`);
      if (el) {
        el.onclick = () => {
          showPopup(ev);
          highlightLocation(ev.location);
        };
      }
    });
  }, 100);
}
  
generateCalendar();
renderWeekEvents();
  
  // 🔥 refresh map markers
  if (typeof initMap === "function") {
    initMap();
  }
});
  if (hasUpcoming) {
  marker.setAnimation(google.maps.Animation.DROP);
}
function isFutureEvent(dateString) {
  const today = new Date();
  today.setHours(0,0,0,0);

  const eventDate = new Date(dateString);

  return eventDate >= today;
}
  function isWithinNext7Days(dateString) {
  const today = new Date();
  today.setHours(0,0,0,0);

  const eventDate = new Date(dateString);

  const diffTime = eventDate - today;
  const diffDays = diffTime / (1000 * 60 * 60 * 24);

  return diffDays >= 0 && diffDays <= 7;
}

function formatEventDate(dateString) {
  const date = new Date(dateString);

  const day = String(date.getDate()).padStart(2, '0');
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const year = date.getFullYear();

  const days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
  const dayName = days[date.getDay()];

  return `${day}/${month}/${year} - ${dayName}`;
}

function generateCalendar(){
  
  const cal = document.getElementById('calendar');
  cal.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById('monthLabel').textContent =
    currentDate.toLocaleString('default', { month:'long', year:'numeric' });

  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();

  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
    let el=document.createElement('div');
    el.className='day-name';
    el.textContent=d;
    cal.appendChild(el);
  });

  for(let i=0;i<firstDay;i++) cal.appendChild(document.createElement('div'));

  for(let d=1; d<=days; d++){
    let div=document.createElement('div');
    div.className='day';

    let dateDiv=document.createElement('div');
    dateDiv.className='date';
    dateDiv.textContent=d;
    div.appendChild(dateDiv);

    let fullDate=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

events.forEach(ev=>{
  if(ev.date === fullDate && isFutureEvent(ev.date)){
    let e=document.createElement('div');
    e.className='event';

    // Format: Name @ Location
    let title = ev.name ? ev.name : ev.discipline;

    // Shorten location for display (optional but nice)
    let shortLocation = ev.location ? ev.location.split(" (")[0] : "";

    e.textContent = shortLocation 
      ? `${title} @ ${shortLocation}` 
      : title;

    e.onclick = () => showPopup(ev);

    div.appendChild(e);
  }
});

    cal.appendChild(div);
  }
}

function changeMonth(dir){
  currentDate.setMonth(currentDate.getMonth()+dir);
  generateCalendar();
}

function submitEvent(e){
  e.preventDefault();

  db.collection("events").add({
    name: document.getElementById('name').value,
    date: document.getElementById('date').value,
    location: document.getElementById('location').value,
    discipline: document.getElementById('discipline').value,
    description: document.getElementById('description').value,
    link: document.getElementById('link').value
  });

  alert("Event submitted!");
}

function showPopup(ev){
  document.getElementById('popup').style.display = "flex";
  document.getElementById('pName').textContent = ev.name;
  document.getElementById('pDate').textContent = "Date: " + ev.date;
  document.getElementById('pLocation').textContent = "Location: " + ev.location;
  document.getElementById('pDiscipline').textContent = "Discipline: " + ev.discipline;
  document.getElementById('pDesc').textContent = ev.description;
  document.getElementById('pLink').href = ev.link;

  // 🔥 NEW
  highlightLocation(ev.location);
}

function closePopup(){
  document.getElementById('popup').style.display = "none";
}
</script>

<script>

const locations = [

{name:"JDM X Park", lat:-32.85, lng:138.05, distance:"Mambray Creek, SA", disciplines:"Drifting"},

  {name:"Adelaide International Raceway", lat:-34.7, lng:138.5, distance:"35 km north", disciplines:"Circuit, Drag Racing"}

];

locations.forEach(loc => {

// Check if this track has an event within 7 days
const hasUpcoming = events.some(ev =>
  ev.location &&
  ev.location.includes(loc.name) &&
  isWithinNext7Days(ev.date)
);

// Change marker appearance
const marker = new google.maps.Marker({
  position: { lat: loc.lat, lng: loc.lng },
  map,
  title: loc.name,
  icon: {
    path: google.maps.SymbolPath.CIRCLE,
    scale: hasUpcoming ? 10 : 6,
    fillColor: hasUpcoming ? "#CC5500" : "#ffd100",
    fillOpacity: 1,
    strokeWeight: hasUpcoming ? 2 : 1,
    strokeColor: "#000"
  }
});
if (hasUpcoming) {
  // subtle bounce once
  marker.setAnimation(google.maps.Animation.DROP);

  // glow effect via pulsing shadow circle
  const glowCircle = new google.maps.Circle({
    strokeColor: "#CC5500",
    strokeOpacity: 0,
    strokeWeight: 0,
    fillColor: "#CC5500",
    fillOpacity: 0.25,
    map,
    center: marker.getPosition(),
    radius: 5000 // size of glow (adjust if needed)
  });

  // animate glow
  let growing = true;
  let size = 5000;

  setInterval(() => {
    if (growing) {
      size += 500;
      if (size > 9000) growing = false;
    } else {
      size -= 500;
      if (size < 5000) growing = true;
    }
    glowCircle.setRadius(size);
  }, 200);
}
  const info = new google.maps.InfoWindow({
    content: `
      <div style="color:black; font-family:Arial;">

    `
  });

marker.addListener("click", () => {

const relatedEvents = events.filter(ev => {
  return ev.location &&
         ev.location.includes(loc.name) &&
         isFutureEvent(ev.date);
});
relatedEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
  let content = `
    <div style="color:black; font-family:Arial;">

  `;

  if (relatedEvents.length > 0) {

content += `<li id="event-${loc.name}-${i}" style="cursor:pointer;color:black;">${ev.name}</li>`;
    });

    content += "</ul>";

  }

  content += "</div>";

infoWindow.setContent(content);
infoWindow.open(map, marker);

  // attach click handlers safely

    relatedEvents.forEach((ev, i) => {

          highlightLocation(ev.location);
        };
      }
    });
  }, 100);
});
  markers[loc.name] = marker;
});
}
// 🔥 highlight function
function highlightLocation(locationName) {
  if (!map || !locationName) return;

  const cleanName = locationName.split(" (")[0];
  const marker = markers[cleanName];

  if (marker) {
    map.setZoom(10);
    map.panTo(marker.getPosition());

    marker.setAnimation(google.maps.Animation.BOUNCE);
    setTimeout(() => marker.setAnimation(null), 1400);
  }
}
