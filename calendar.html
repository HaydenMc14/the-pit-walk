<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calendar - The Pit Walk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0d0d0d;
      color: #fff;
    }

    header {
      background: #000;
      padding: 20px;
      text-align: center;
      border-bottom: 3px solid #ffd100;
    }

    header h1 {
      color: #ffd100;
      margin: 0;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .event {
      background: #1a1a1a;
      margin-bottom: 20px;
      padding: 20px;
      border-left: 5px solid #ffd100;
      border-radius: 8px;
    }

    .event h3 {
      margin: 0;
      color: #ffd100;
    }

    .event a {
      display: inline-block;
      margin-top: 10px;
      color: #000;
      background: #ffd100;
      padding: 8px 15px;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>THE PIT WALK</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="calendar.html">Calendar</a>
    <a href="gallery.html">Gallery</a>
    <a href="ai.html">AI Articles</a>
  </nav>
</header>

<section class="section">
  <h2>Upcoming Events</h2>
  <div id="events"></div>
</section>

<script>
fetch('events.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('events');

    data.forEach(event => {
      const div = document.createElement('div');
      div.className = 'event';

      div.innerHTML = `
        <h3>${event.title}</h3>
        <p><strong>Date:</strong> ${event.date}</p>
        <p><strong>Location:</strong> ${event.location}</p>
        <p>${event.description}</p>
        <a href="${event.link}" target="_blank">View Event</a>
      `;

      container.appendChild(div);
    });
  });
</script>

</body>
</html>
